<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/tasks.js"></script>
    <title>Список задач</title>
</head>
<body>
    <div id="task-container">
        <div class="column" id="do-tasks-column">
            <div class="column-header">
                <h2>Сделать <span class="counter">0</span></h2> 
                <button class="more-options">⋮</button> 
            </div>

            <button class="add-task-btn">
                <span class="plus-icon">+</span> Добавить задачу
            </button>

            <div class="task-list"></div>
        </div>

        <div class="column" id="in-progress-tasks-column">
            <div class="column-header">
                <h2>В работе <span class="counter">0</span></h2> 
                <button class="more-options">⋮</button> 
            </div>

            <button class="add-task-btn">
                <span class="plus-icon">+</span> Добавить задачу
            </button>

            <div class="task-list"></div>
        </div>

        <div class="column" id="done-tasks-column">
            <div class="column-header">
                <h2>Готово <span class="counter">0</span></h2>
                <button class="more-options">⋮</button>
            </div>

            <button class="add-task-btn">
                <span class="plus-icon">+</span> Добавить задачу
            </button>

            <div class="task-list"></div>
        </div>
    </div>

    <template id="task-template">
        <div class="task priority-low" draggable="true">
            <div class="task-content">Текст задачи</div>
            
            <div class="task-actions">
                <button class="task-menu-btn">⋮</button>
                
                <div class="task-dropdown hidden">
                    <button class="dropdown-item priority-btn">Приоритет: Низкий</button>

                    <hr style="margin: 5px 0; border: none; border-top: 1px solid var(--column-border);">

                    <button class="dropdown-item done-btn">Отметить выполненной</button>
                    <button class="dropdown-item copy-btn">Копировать</button>
                    <button class="dropdown-item delete-btn">Удалить</button>
                </div>
            </div>
        </div>
    </template>
</body>
</html>
